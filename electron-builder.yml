appId: com.github.normannormalmann.ultrastar
productName: UltraStar - Dirty Little Helper
directories:
  output: dist
files:
  - out/**
  - package.json
  - "!node_modules/**"
npmRebuild: false
nodeGypRebuild: false
# All runtime code is bundled by electron-vite; no node_modules are needed at runtime.
extraMetadata:
  dependencies: {}
win:
  target:
    - nsis
  signAndEditExecutable: false
  icon: resources/icon.ico
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
