appId: com.github.normannormalmann.ultrastar
productName: UltraStar - Dirty Little Helper
directories:
  output: dist
files:
  - out/**
  - package.json
  - "!node_modules/**"
npmRebuild: false
nodeGypRebuild: false
# All runtime code is bundled by electron-vite; no node_modules are needed at runtime.
extraMetadata:
  dependencies: {}
win:
  target:
    - nsis
  signAndEditExecutable: false
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
# Hinweis: bewusst ohne eigenes Icon in v1 (Standard-Electron-Icon);
# eigenes .ico ist als Folgeaufgabe vorgesehen.
