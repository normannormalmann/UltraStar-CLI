name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun.js
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run audit (high severity and above)
        run: bun audit --audit-level=high
        continue-on-error: false

      - name: Run audit (production dependencies only)
        run: bun audit --prod --audit-level=moderate
        continue-on-error: false

      - name: Check for outdated dependencies
        run: bun outdated || true

      - name: Generate security report
        if: always()
        run: |
          echo "## Security Scan Results" > $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Security audit completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Security audit found issues or failed to run" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Audit Levels" >> $GITHUB_STEP_SUMMARY
          echo "- **High/Severe**: Failed the build" >> $GITHUB_STEP_SUMMARY
          echo "- **Moderate (production)**: Failed the build" >> $GITHUB_STEP_SUMMARY
