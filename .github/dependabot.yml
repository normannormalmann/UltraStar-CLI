version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    # Labels for pull requests
    labels:
      - "dependencies"
      - "security"
    # Group dependencies by major version
    groups:
      prod-dependencies:
        patterns:
          - "dependencies"
        exclude-patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
      dev-dependencies:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
          - "vitest*"
          - "@typescript-eslint/*"
    # Require security updates
    versioning-strategy: increase
    commit-message:
      prefix: "chore"
      prefix-development: "chore(deps)"
      include: "scope"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "github-actions"
      - "dependencies"
    commit-message:
      prefix: "ci"
      include: "scope"
